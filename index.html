<!DOCTYPE html>
<html lang="ru">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="🐍 Классическая игра Змейка">
    <meta name="theme-color" content="#2E1065">
    <title>🐍 Snake Game</title>
    
    <!-- ✅ ИСПРАВЛЕННЫЙ ФАВИКОН -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
    
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>🐍 Змейка</h1>
    
    <div class="rules">
        <h2>📜 Правила</h2>
        <p>Наберите 150 очков за 60 секунд. Не врезайтесь в стены и хвост.</p>
        <p>⌨️ Стрелки / WASD или кнопки на экране</p>
    </div>
    
    <div class="container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="stats">
            <div>⚡ Скорость: <span id="speed">150</span></div>
            <div>📏 Размер: <span id="size">1</span></div>
            <div>🏆 Очки: <span id="points">0</span></div>
            <div>⏰ Время: <span id="timer">01:00</span></div>
        </div>
    </div>
    
    <!-- Десктопные кнопки -->
    <div class="controls">
        <button onclick="startGame()">▶️ Старт</button>
        <button onclick="pauseGame()">⏸️ Пауза</button>
        <button onclick="resetGame()">🔄 Сброс</button>
    </div>

    <!-- Мобильные кнопки -->
    <div class="mobile-controls">
        <div class="dpad">
            <button class="dpad-btn" id="btnUp">⬆️</button>
            <button class="dpad-btn" id="btnLeft">⬅️</button>
            <button class="dpad-btn" id="btnRight">➡️</button>
            <button class="dpad-btn" id="btnDown">⬇️</button>
        </div>
        <div class="mobile-actions">
            <button class="action-btn" id="btnStart">▶️</button>
            <button class="action-btn" id="btnPause">⏸️</button>
            <button class="action-btn" id="btnReset">🔄</button>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
